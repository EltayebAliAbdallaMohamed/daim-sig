<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Interactive Materials Based on Media</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="content">
    <h1>Interactive Materials Based on Media</h1>

    <div id="searchBar">
      <input type="text" id="searchInput" placeholder="Enter slide number(s) e.g., 1 or 1,3,5" />
      <button id="searchBtn">Go</button>
      <label>
        <input type="checkbox" id="filterToggle" /> Filter Mode
      </label>
    </div>

    <p id="slideNumber">Slide 1 of X</p>
    <div id="slideBody">Loading data...</div>

    <div class="controls">
      <button id="prevBtn">Previous</button>
      <button id="checkBtn">Check Answer</button>
      <button id="nextBtn">Next</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
